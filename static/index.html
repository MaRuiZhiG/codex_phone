      button.textContent = collapsed ? "展开更多" : "收起内容";
    }

    function shortPath(value) {
      if (!value) return "未绑定工作目录";
      return value.split(/[\\/]/).filter(Boolean).slice(-2).join(" / ");
    }

    function formatTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString("zh-CN", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function formatElapsed(value) {
      const totalSeconds = Math.max(0, Math.floor(Number(value || 0) / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (hours > 0) {
        return `${hours}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function normalizeThinkingText(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function effortLabel(value) {
      return {
        none: "关闭",
        minimal: "极低",
        low: "低",
        medium: "中",
        high: "高",
        xhigh: "超高",
      }[String(value || "").toLowerCase()] || String(value || "").toUpperCase();
    }

    function shortModelLabel(value) {
      const text = String(value || "").trim();
      if (!text) return "模型";
      if (text.startsWith("gpt-")) return text.slice(4);
      if (text.startsWith("deepseek-")) return text.replace("deepseek-", "DS ");
      if (text.length <= 9) return text;
      return `${text.slice(0, 8)}…`;
    }

    function currentThread() {
      return state.threads.find((thread) => thread.id === state.currentThreadId) || null;
    }

    function isNearBottom() {
      return window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 140;
    }

    function isLooseChatThread(thread) {
      const parts = splitPath(thread.cwd || "");
      if (!parts.length) return true;

      const lowered = parts.map((part) => part.toLowerCase());
      if (lowered.includes("new-chat")) return true;
      if (lowered.some((part) => part.startsWith("files-mentioned-by-the-user"))) return true;

      const codexIndex = lowered.lastIndexOf("codex");
      if (codexIndex >= 0 && parts.length >= codexIndex + 2) {
        const dateLike = parts[codexIndex + 1] || "";
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateLike)) return true;
      }

      return false;
    }

    function projectGroupInfo(thread) {
      if (isLooseChatThread(thread)) {
        return {
          key: "__loose__",
          title: "对话",
          path: "",
          kind: "loose",
        };
      }

      const parts = splitPath(thread.cwd || "");
      const title = parts[parts.length - 1] || "未命名项目";
      return {
        key: String(thread.cwd || title),
        title,
        path: String(thread.cwd || ""),
        kind: "project",
      };
    }

    function renderDrawerThread(thread, compact = false) {
      const meta = compact ? formatTime(thread.updatedAt || "") : `${shortPath(thread.cwd || "")}<br>${formatTime(thread.updatedAt || "")}`;
      return `
        <button class="drawer-thread ${thread.id === state.currentThreadId ? "active" : ""}" data-thread-id="${thread.id}" type="button">
          <div class="drawer-thread-name">${escapeHtml(thread.name || "Untitled")}</div>
          <div class="drawer-thread-meta">${escapeHtml(meta).replace(/&lt;br&gt;/g, "<br>")}</div>
        </button>
      `;
    }

    function attachmentUrl(value) {
      if (!value) return "";
      if (/^data:/i.test(value) || /^https?:/i.test(value)) return value;
      return `/codex/attachment?token=${encodeURIComponent(state.token)}&path=${encodeURIComponent(value)}`;
    }

    function normalizeAttachments(items = []) {
      return items.map((item, index) => {
        if (typeof item === "string") {
          const parts = item.split(/[\\/]/);
          const name = parts[parts.length - 1] || `image-${index + 1}`;
          return { name, src: attachmentUrl(item) };
        }

        const src = item.dataUrl || item.src || "";
        if (!src) return null;
        return {
          name: item.name || `image-${index + 1}`,
          src: attachmentUrl(src),
        };
      }).filter(Boolean);
    }

    function visibleMessages(messages = []) {
      const count = Math.max(state.historyPageSize, state.visibleMessageCount);
      return messages.slice(Math.max(0, messages.length - count));
    }

    function hasOlderMessages(messages = state.lastMessages) {
      return visibleMessages(messages).length < messages.length;
    }

    function canPullOlderMessages() {
      return !state.drawerOpen && !state.loadingOlderMessages && !messagesShell.classList.contains("hidden") && hasOlderMessages();
    }

    function clearPullHoldTimer() {
      if (state.pullHoldTimer) {
        clearInterval(state.pullHoldTimer);
        state.pullHoldTimer = null;
      }
    }

    function resetPullGesture() {
      clearPullHoldTimer();
      state.pullActive = false;
      state.pullTriggered = false;
      state.pullStartY = 0;
      state.pullDistance = 0;
      state.pullProgress = 0;
      state.pullHoldProgress = 0;
      state.pullHoldStartAt = 0;
      state.pullPointerId = null;
    }

    function beginPullGesture(startY, pointerId = null) {
      if (state.pullActive) return false;
      if (!canPullOlderMessages() || window.scrollY > 6) return false;

      state.pullActive = true;
      state.pullTriggered = false;
      state.pullStartY = startY;
      state.pullDistance = 0;
      state.pullProgress = 0;
      state.pullHoldProgress = 0;
      state.pullHoldStartAt = 0;
      state.pullPointerId = pointerId;
      clearPullHoldTimer();
      renderHistoryLoader();
      return true;
    }

    function startPullHold() {
      if (state.pullHoldTimer || state.pullTriggered) return;

      state.pullHoldStartAt = performance.now();
      state.pullHoldTimer = setInterval(() => {
        const elapsed = performance.now() - state.pullHoldStartAt;
        state.pullHoldProgress = Math.max(0, Math.min(1, elapsed / PULL_LOAD_HOLD_MS));
        renderHistoryLoader();
        if (state.pullHoldProgress >= 1) {
          clearPullHoldTimer();
          state.pullTriggered = true;
          loadOlderMessages().finally(() => {
            resetPullGesture();
            renderHistoryLoader();
          });
        }
      }, 40);
    }

    function renderHistoryLoader(messages = state.lastMessages) {
      const showLoader = state.pullActive || (messages.length > 0 && hasOlderMessages(messages));
      historyLoaderAnchor.classList.toggle("hidden", !showLoader);
      if (!showLoader) {
        historyLoaderAnchor.innerHTML = "";
        return;
      }

      const pulling = state.pullActive && !state.loadingOlderMessages;
      const holding = pulling && state.pullProgress >= 1;
      const loading = state.loadingOlderMessages;
      const displayProgress = loading
        ? 0
        : holding
          ? state.pullHoldProgress
          : state.pullProgress;
      const remainingSeconds = Math.max(0, (PULL_LOAD_HOLD_MS - (state.pullHoldProgress * PULL_LOAD_HOLD_MS)) / 1000);
      const title = loading
        ? "正在加载更早对话..."
        : holding
          ? "稳住，正在解锁旧消息"
          : pulling
            ? "继续下拉"
            : "上拉查看更早对话";
      const sub = loading
        ? "马上把更早的内容接上来"
        : holding
          ? `继续保持 ${remainingSeconds.toFixed(1)} 秒`
          : pulling
            ? "拉满后停住约 1 秒"
            : "到顶部后下拉并停住约 1 秒";
      const pillClass = loading
        ? "loading"
        : holding
          ? "holding"
          : pulling
            ? "pulling"
            : "";
      const shiftPx = Math.min(26, state.pullDistance * 0.22);
      const scale = 1 + Math.min(0.06, state.pullDistance / 1600);

      historyLoaderAnchor.innerHTML = `
        <div
          class="history-loader-pill ${pillClass}"
          style="--pull-shift:${shiftPx.toFixed(1)}px; --pull-scale:${scale.toFixed(3)}; --pull-progress:${Math.max(0, Math.min(1, displayProgress)).toFixed(3)};"
        >
          ${loading ? `<span class="history-loader-spinner" aria-hidden="true"></span>` : `<span class="history-loader-gauge" aria-hidden="true"></span>`}
          <span class="history-loader-copy">
            <span class="history-loader-title">${title}</span>
            <span class="history-loader-sub">${sub}</span>
          </span>
        </div>
      `;
    }

    function scrollToLatest() {
      requestAnimationFrame(() => {
        window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "auto" });
      });
    }

    function currentModelSelection() {
      return state.modelConfig?.current || { model: "", effort: "high", providerName: "" };
    }

    function modelDraftDirty() {
      const current = currentModelSelection();
      return state.draftModel !== (current.model || "") || state.draftEffort !== (current.effort || "");
    }

    function setModelPanel(open) {
      state.modelPanelOpen = Boolean(open);
      modelPanel.classList.toggle("hidden", !state.modelPanelOpen);
      modelPickerBtn.classList.toggle("open", state.modelPanelOpen);
    }

    function renderModelPicker() {
      const current = currentModelSelection();
      modelPickerName.textContent = shortModelLabel(current.model || "");
      modelPickerEffort.textContent = effortLabel(current.effort || "high");

      if (!state.modelConfig) {
        modelPanelSub.textContent = "正在读取当前 provider 模型列表...";
        modelChoiceList.innerHTML = "";
        effortChipRow.innerHTML = "";
        applyModelBtn.classList.add("disabled");
        return;
      }

      const providerName = current.providerName || current.provider || "当前 Codex provider";
      modelPanelSub.textContent = `${providerName}${current.baseUrl ? ` · ${current.baseUrl}` : ""}`;

      modelChoiceList.innerHTML = (state.modelConfig.models || []).map((model) => `
        <button class="model-choice-item ${model === state.draftModel ? "active" : ""}" data-model-choice="${escapeHtml(model)}" type="button">
          <div class="model-choice-name">${escapeHtml(model)}</div>
          <div class="model-choice-meta">${model === current.model ? "当前正在使用" : "由当前 provider 动态返回"}</div>
        </button>
      `).join("");

      effortChipRow.innerHTML = (state.modelConfig.efforts || []).map((effort) => `
        <button class="effort-chip ${effort === state.draftEffort ? "active" : ""}" data-effort-choice="${escapeHtml(effort)}" type="button">
          ${escapeHtml(effortLabel(effort))}
        </button>
      `).join("");

      modelChoiceList.querySelectorAll("[data-model-choice]").forEach((node) => {
        node.addEventListener("click", () => {
          state.draftModel = node.getAttribute("data-model-choice") || state.draftModel;
          renderModelPicker();
        });
      });

      effortChipRow.querySelectorAll("[data-effort-choice]").forEach((node) => {
        node.addEventListener("click", () => {
          state.draftEffort = node.getAttribute("data-effort-choice") || state.draftEffort;
          renderModelPicker();
        });
      });

      modelPanelNote.textContent = state.applyingModel
        ? "正在写回本机 Codex 配置..."
        : "会修改你电脑上的 Codex 配置，通常从下一轮对话开始生效。";
      applyModelBtn.textContent = state.applyingModel ? "应用中..." : "应用到 Codex";
      applyModelBtn.classList.toggle("disabled", state.applyingModel || !modelDraftDirty());
    }

    function autoResizeComposer() {
      messageInput.style.height = "46px";
      messageInput.style.height = `${Math.min(messageInput.scrollHeight, 140)}px`;
    }

    function setComposerRunning(running) {
      state.isRunning = Boolean(running);
      if (!state.isRunning) {
        state.isSending = false;
        state.isInterrupting = false;
        state.interruptRequested = false;
      }
      sendBtn.classList.toggle("loading", state.isRunning);
      sendBtn.setAttribute("aria-busy", state.isRunning ? "true" : "false");
      sendBtn.setAttribute("aria-label", state.isRunning ? "中断对话" : "发送消息");
      updateSendState();
    }

    function updateSendState() {
      const disabled =
        state.isReadingAttachments ||
        state.isInterrupting ||
        (state.isSending && state.interruptRequested) ||
        (!state.isRunning && !messageInput.value.trim() && !state.attachments.length);
      sendBtn.classList.toggle("disabled", disabled);
      sendBtn.disabled = disabled;
    }

    function setMeta(message) {
      composerStatusMeta.textContent = message;
    }

    function setDrawer(open) {
      state.drawerOpen = open;
      document.body.classList.toggle("drawer-open", open);
      drawerBackdrop.classList.toggle("open", open);
      drawerPanel.classList.toggle("open", open);
      drawerPanel.setAttribute("aria-hidden", open ? "false" : "true");
    }

    function clearPollTimer() {
      if (state.pollTimer) {
        clearTimeout(state.pollTimer);
        state.pollTimer = null;
      }
    }

    async function interruptConversation() {
      if (!state.isRunning || state.isInterrupting) return;

      if (state.isSending) {
        state.interruptRequested = true;
        updateSendState();
        setMeta("已记录中断请求，等消息真正进入 Codex 后会立刻停止。");
        return;
      }

      state.interruptRequested = false;
      state.isInterrupting = true;
      updateSendState();
      setMeta("正在尝试中断这轮 Codex 对话...");

      try {
        await api("/codex/interrupt", {
          method: "POST",
          body: JSON.stringify({
            threadId: state.watch?.threadId || state.currentThreadId,
          }),
        });
        const status = await loadStatus();
        if (status && status.status === "running") schedulePoll();
      } catch (error) {
        state.isInterrupting = false;
        updateSendState();
        setMeta(`中断失败: ${error.message}`);
      }
    }

    function schedulePoll() {
      clearPollTimer();
      setComposerRunning(true);
      state.pollTimer = setTimeout(async () => {
        try {
          const status = await loadStatus();
          await loadHistory();
          if (state.interruptRequested && status && status.status === "running") {
            await interruptConversation();
          } else if (status && (status.status === "running" || state.isSending || state.interruptRequested)) {
            schedulePoll();
          }
        } catch (error) {
          setMeta(`同步失败: ${error.message}`);
        }
      }, 1800);
    }

    async function api(path, options = {}) {
      const headers = new Headers(options.headers || {});
      headers.set("x-mobile-typer-token", state.token);
      if (!headers.has("content-type") && options.body) headers.set("content-type", "application/json");
      let res;
      try {
        res = await fetch(path, { ...options, headers });
      } catch (error) {
        setConnectionState("offline", "本地服务不可达");
        throw error;
      }

      const json = await res.json().catch(() => ({}));
      if (!res.ok || json.ok === false) {
        setConnectionState("offline", json.message || json.detail?.message || "请求失败");
        throw new Error(json.message || json.detail?.message || "request failed");
      }

      if (!String(path || "").startsWith("/codex/status")) {
        markBackendReachable("后端在线，等待确认 Codex 状态");
      }
      return json;
    }

    async function loadModelConfig() {
      const data = await api("/codex/models");
      state.modelConfig = data;
      state.draftModel = data.current?.model || "";
      state.draftEffort = data.current?.effort || "high";
      renderModelPicker();
      return data;
    }

    async function applyModelConfig() {
      if (!state.modelConfig || state.applyingModel || !modelDraftDirty()) return;

      state.applyingModel = true;
      renderModelPicker();
      try {
        const data = await api("/codex/models", {
          method: "POST",
          body: JSON.stringify({
            model: state.draftModel,
            effort: state.draftEffort,
          }),
        });
        state.modelConfig = data;
        state.draftModel = data.current?.model || state.draftModel;
        state.draftEffort = data.current?.effort || state.draftEffort;
        setMeta(`已切换为 ${data.current?.model || state.draftModel} / ${effortLabel(data.current?.effort || state.draftEffort)}`);
        setModelPanel(false);
      } catch (error) {
        setMeta(`模型切换失败: ${error.message}`);
      } finally {
        state.applyingModel = false;
        renderModelPicker();
      }
    }

    async function loadOlderMessages() {
      if (state.loadingOlderMessages || !hasOlderMessages()) return;

      state.loadingOlderMessages = true;
      const previousHeight = document.documentElement.scrollHeight;
      renderHistoryLoader();

      await new Promise((resolve) => setTimeout(resolve, 360));

      state.visibleMessageCount = Math.min(
        state.visibleMessageCount + state.historyPageSize,
        state.lastMessages.length,
      );
      state.loadingOlderMessages = false;
      renderHistory(state.lastMessages, {
        preserveScroll: true,
        previousHeight,
      });
    }

    function applyPullResistance(deltaY) {
      const limited = Math.max(0, deltaY);
      return Math.min(132, limited * 0.56);
    }

    function updatePullGesture(clientY) {
      if (!state.pullActive || state.pullTriggered || !canPullOlderMessages()) return;

      const rawDelta = clientY - state.pullStartY;
      if (rawDelta <= 0) {
        clearPullHoldTimer();
        state.pullDistance = 0;
        state.pullProgress = 0;
        state.pullHoldProgress = 0;
        renderHistoryLoader();
        return;
      }

      state.pullDistance = applyPullResistance(rawDelta);
      state.pullProgress = Math.max(0, Math.min(1, state.pullDistance / PULL_LOAD_DISTANCE));

      if (state.pullProgress >= 1) {
        startPullHold();
      } else {
        clearPullHoldTimer();
        state.pullHoldProgress = 0;
        state.pullHoldStartAt = 0;
      }

      renderHistoryLoader();
    }

    function renderThreadSummary() {
      const active = currentThread();
      if (!active) {
        composerThreadMeta.textContent = "等待选择线程";
        return;
      }
      composerThreadMeta.textContent = `${shortPath(active.cwd || "")} · ${formatTime(active.updatedAt || "")}`;
    }

    function splitPath(value) {
      return String(value || "").split(/[\\/]/).filter(Boolean);
    }

    function isLooseChatThread(thread) {
      const parts = splitPath(thread.cwd || "");
      if (!parts.length) return true;

      const lowered = parts.map((part) => part.toLowerCase());
      if (lowered.includes("new-chat")) return true;
      if (lowered.some((part) => part.startsWith("files-mentioned-by-the-user"))) return true;

      const codexIndex = lowered.lastIndexOf("codex");
      if (codexIndex >= 0 && parts.length >= codexIndex + 2) {
        const dateLike = parts[codexIndex + 1] || "";
        if (/^\d{4}-\d{2}-\d{2}$/.test(dateLike)) return true;
      }

      return false;
    }

    function projectGroupInfo(thread) {
      if (isLooseChatThread(thread)) {
        return {
          key: "__loose__",
          title: "对话",
          path: "",
          kind: "loose",
        };
      }

      const parts = splitPath(thread.cwd || "");
      const title = parts[parts.length - 1] || "未命名项目";
      return {
        key: String(thread.cwd || title),
        title,
        path: String(thread.cwd || ""),
        kind: "project",
      };
    }

    function renderDrawerThread(thread, compact = false) {
      const meta = compact
        ? formatTime(thread.updatedAt || "")
        : `${shortPath(thread.cwd || "")}<br>${formatTime(thread.updatedAt || "")}`;
      return `
        <button class="drawer-thread ${thread.id === state.currentThreadId ? "active" : ""}" data-thread-id="${thread.id}" type="button">
          <div class="drawer-thread-name">${escapeHtml(thread.name || "Untitled")}</div>
          <div class="drawer-thread-meta">${escapeHtml(meta).replace(/&lt;br&gt;/g, "<br>")}</div>
        </button>
      `;
    }

    function saveProjectCollapsedState() {
      try {
        localStorage.setItem("codex-phone-project-collapsed", JSON.stringify(state.projectCollapsed || {}));
      } catch {}
    }

    function isProjectCollapsed(groupKey) {
      return Boolean(state.projectCollapsed && state.projectCollapsed[groupKey]);
    }

    function toggleProjectCollapsed(groupKey) {
      state.projectCollapsed[groupKey] = !isProjectCollapsed(groupKey);
      saveProjectCollapsedState();
      renderThreadDrawer();
    }

    function renderThreadDrawer() {
      if (!state.threads.length) {
        threadDrawerList.innerHTML = `<div class="drawer-empty">还没有发现可切换的线程。确认 Codex Desktop 已启动，并且当前目录下已有 .codex 会话文件。</div>`;
        return;
      }

      const grouped = state.threads.reduce((acc, thread) => {
        const group = projectGroupInfo(thread);
        if (!acc[group.key]) {
          acc[group.key] = {
            ...group,
            threads: [],
          };
        }
        acc[group.key].threads.push(thread);
        return acc;
      }, {});

      const groups = Object.values(grouped);
      const looseGroup = groups.find((group) => group.kind === "loose");
      const projectGroups = groups
        .filter((group) => group.kind === "project")
        .sort((a, b) => (b.threads[0]?.mtimeMs || 0) - (a.threads[0]?.mtimeMs || 0));

      threadDrawerList.innerHTML = [
        looseGroup ? `
          <section class="drawer-group">
            <div class="drawer-group-title">对话</div>
            <div class="drawer-project-threads">
              ${looseGroup.threads.map((thread) => renderDrawerThread(thread)).join("")}
            </div>
          </section>
        ` : "",
        projectGroups.length ? `
          <section class="drawer-group">
            <div class="drawer-group-title">项目</div>
            ${projectGroups.map((group) => `
              <div class="drawer-project">
                <div class="drawer-project-head">
                  <div class="drawer-project-summary">
                    <div class="drawer-project-name">${escapeHtml(group.title)}</div>
                    <div class="drawer-project-path">${escapeHtml(group.path)}</div>
                  </div>
                  <button
                    class="drawer-project-toggle ${isProjectCollapsed(group.key) ? "collapsed" : ""}"
                    data-project-toggle="${escapeHtml(group.key)}"
                    type="button"
                    aria-label="${isProjectCollapsed(group.key) ? "展开项目对话" : "收起项目对话"}"
                  >
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                      <path d="M7 10l5 5 5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </div>
                <div class="drawer-project-threads ${isProjectCollapsed(group.key) ? "collapsed" : ""}">
                  ${group.threads.map((thread) => renderDrawerThread(thread, true)).join("")}
                </div>
              </div>
            `).join("")}
          </section>
        ` : "",
      ].filter(Boolean).join("");

      threadDrawerList.querySelectorAll("[data-thread-id]").forEach((node) => {
        node.addEventListener("click", async () => {
          const threadId = node.getAttribute("data-thread-id");
          await selectThread(threadId);
        });
      });

      threadDrawerList.querySelectorAll("[data-project-toggle]").forEach((node) => {
        node.addEventListener("click", (event) => {
          event.stopPropagation();
          const groupKey = node.getAttribute("data-project-toggle");
          if (!groupKey) return;
          toggleProjectCollapsed(groupKey);
        });
      });
    }

    function renderAttachmentPreview() {
      document.body.classList.toggle("chat-active", Boolean(state.attachments.length || messageInput.value.trim() || state.lastMessages.length));
      if (!state.attachments.length) {
        attachmentStrip.classList.remove("has-items");
        attachmentStrip.innerHTML = "";
        if (!messageInput.value.trim()) {
          setMeta(state.token ? "本地直连" : "缺少 token");
        }
        updateSendState();
        return;
      }

      attachmentStrip.classList.add("has-items");
      attachmentStrip.innerHTML = state.attachments.map((item, index) => `
        <div class="thumb">
          <button class="thumb-remove" data-attachment-remove="${index}" type="button">×</button>
          <img src="${item.dataUrl}" alt="${escapeHtml(item.name || "image")}">
        </div>
      `).join("");

      attachmentStrip.querySelectorAll("[data-attachment-remove]").forEach((node) => {
        node.addEventListener("click", () => {
          const index = Number(node.getAttribute("data-attachment-remove"));
          state.attachments.splice(index, 1);
          renderAttachmentPreview();
        });
      });

      setMeta(`已选择 ${state.attachments.length} 张图片，发送后会一起交给 Codex。`);
      updateSendState();
    }

    function thinkingSteps(status = state.liveStatus) {
      const rows = Array.isArray(status?.steps) ? status.steps : [];
      const filtered = [];
      const seen = new Set();

      for (const row of rows) {
        const label = String(row?.label || "").toLowerCase();
        const text = normalizeThinkingText(row?.text || "");
        if (!text) continue;
        if (["final_answer", "task_complete", "error", "commentary"].includes(label)) continue;

        const key = text.toLowerCase();
        if (seen.has(key)) continue;
        seen.add(key);

        filtered.push({
          label,
          text: label === "task_started" && text === "Codex started working."
            ? "已经开始处理这条请求"
            : text,
        });
      }

      if (!filtered.length) {
        const fallback = normalizeThinkingText(status?.preview || "");
        if (fallback) {
          filtered.push({ label: "preview", text: fallback });
        }
      }

      return filtered.slice(-3);
    }

    function thinkingElapsedMs(status = state.liveStatus) {
      if (!status?.startedAt) return 0;
      const startedAt = new Date(status.startedAt).getTime();
      if (!Number.isFinite(startedAt)) return 0;
      return Math.max(0, Date.now() - startedAt);
    }

    function clearThinkingTimer() {
      if (!state.thinkingTimer) return;
      clearInterval(state.thinkingTimer);
      state.thinkingTimer = null;
    }

    function ensureThinkingTimer() {
      if (state.thinkingTimer) return;
      if (!state.liveStatus || state.liveStatus.status !== "running") return;
      state.thinkingTimer = setInterval(() => {
        renderThinking();
      }, 1000);
    }

    function renderThinking(status = state.liveStatus) {
      const activeStatus = status && status.status === "running" ? status : null;
      thinkingShell.classList.toggle("hidden", !activeStatus);

      if (!activeStatus) {
        thinkingShell.innerHTML = "";
        clearThinkingTimer();
        return;
      }

      const elapsed = formatElapsed(thinkingElapsedMs(activeStatus));
      const steps = thinkingSteps(activeStatus);
      thinkingShell.innerHTML = `
        <article class="thinking-card">
          <div class="thinking-head">
            <div class="thinking-title">
              <span class="thinking-pulse" aria-hidden="true"></span>
              <span>Codex 正在思考</span>
            </div>
            <div class="thinking-time">已运行 ${elapsed}</div>
          </div>
          <div class="thinking-steps">
            ${steps.map((step) => `
              <div class="thinking-step">
                <span class="thinking-step-dot" aria-hidden="true"></span>
                <div class="thinking-step-text">${escapeHtml(step.text)}</div>
              </div>
            `).join("")}
          </div>
        </article>
      `;
      ensureThinkingTimer();
    }

    function renderHistory(messages = []) {
      state.lastMessages = messages;
      document.body.classList.toggle("chat-active", Boolean(messages.length || state.attachments.length || messageInput.value.trim()));
      const hasMessages = messages.length > 0;
      heroPanel.classList.toggle("hidden", hasMessages);
      messagesShell.classList.toggle("hidden", !hasMessages);

      if (!hasMessages) {
        historyList.innerHTML = `<div class="empty-history">这条线程里暂时还没有回流内容。你可以直接在下方输入框里提问，或者在左上角会话栏里切换其他线程。</div>`;
        heroTitle.textContent = "今天想让 Codex 帮你做什么？";
        return;
      }

      heroTitle.textContent = "继续这段对话";
      historyList.innerHTML = messages.map((msg) => {
        const attachments = normalizeAttachments(msg.attachments || []);
        const singleClass = attachments.length === 1 ? " single" : "";
        return `
          <article class="message-card ${escapeHtml(msg.role || "assistant")}">
            <div class="message-meta">
              <span class="message-role">${escapeHtml(msg.label || msg.role || "assistant")}</span>
              <span>${escapeHtml(formatTime(msg.timestamp || ""))}</span>
            </div>
            ${renderMessageText(msg)}
            ${attachments.length ? `
              <div class="message-images${singleClass}">
                ${attachments.map((item) => `
                  <div class="message-image-frame${singleClass}">
                    <img class="message-image" src="${escapeHtml(item.src)}" alt="${escapeHtml(item.name)}" loading="lazy">
                  </div>
                `).join("")}
              </div>
            ` : ""}
          </article>
        `;
      }).join("");
    }

    function renderStatus(status = null) {
      if (!status || status.available === false) {
        state.liveStatus = null;
        renderThinking(null);
        if (state.isSending) {
          setComposerRunning(true);
          return;
        }
        setComposerRunning(false);
        return;
      }

      if (status.status === "running") {
        state.isSending = false;
        state.liveStatus = status;
      } else if (status.status === "complete" || status.status === "error" || status.status === "missing") {
        state.isSending = false;
        state.liveStatus = null;
      } else {
        state.liveStatus = null;
      }

      renderThinking(state.liveStatus);
      setComposerRunning(status.status === "running");
    }

    async function loadThreads() {
      const data = await api("/codex/threads");
      state.threads = data.threads || [];
      if (!state.currentThreadId && state.threads[0]) state.currentThreadId = state.threads[0].id;
      renderThreadSummary();
      renderThreadDrawer();
    }

    async function loadHistory() {
      const threadId = state.watch?.threadId || state.currentThreadId;
      if (!threadId) {
        renderHistory([]);
        return null;
      }
      const data = await api(`/codex/history?thread=${encodeURIComponent(threadId)}`);
      renderHistory(data.messages || []);
      return data;
    }

    renderHistory = function(messages = [], options = {}) {
      const {
        preserveScroll = false,
        previousHeight = 0,
        snapToBottom = false,
      } = options;

      state.lastMessages = messages;
      state.codeBlockMap = {};
      state.codeBlockCounter = 0;
      state.messageBodyMap = {};
      state.messageBodyCounter = 0;
      document.body.classList.toggle("chat-active", Boolean(messages.length || state.attachments.length || messageInput.value.trim()));
      const hasMessages = messages.length > 0;
      heroPanel.classList.toggle("hidden", hasMessages);
      messagesShell.classList.toggle("hidden", !hasMessages);
      renderHistoryLoader(messages);

      if (!hasMessages) {
        historyList.innerHTML = `<div class="empty-history">杩欐潯绾跨▼閲屾殏鏃惰繕娌℃湁鍥炴祦鍐呭銆備綘鍙互鐩存帴鍦ㄤ笅鏂硅緭鍏ユ閲屾彁闂紝鎴栬€呭湪宸︿笂瑙掍細璇濇爮閲屽垏鎹㈠叾浠栫嚎绋嬨€?/div>`;
        heroTitle.textContent = "浠婂ぉ鎯宠 Codex 甯綘鍋氫粈涔堬紵";
        state.renderedThreadId = state.watch?.threadId || state.currentThreadId || "";
        return;
      }

      heroTitle.textContent = "缁х画杩欐瀵硅瘽";
      historyList.innerHTML = visibleMessages(messages).map((msg) => {
        const attachments = normalizeAttachments(msg.attachments || []);
        const singleClass = attachments.length === 1 ? " single" : "";
        return `
          <article class="message-card ${escapeHtml(msg.role || "assistant")}">
            <div class="message-meta">
              <span class="message-role">${escapeHtml(msg.label || msg.role || "assistant")}</span>
              <span>${escapeHtml(formatTime(msg.timestamp || ""))}</span>
            </div>
            ${renderMessageText(msg)}
            ${attachments.length ? `
              <div class="message-images${singleClass}">
                ${attachments.map((item) => `
                  <div class="message-image-frame${singleClass}">
                    <img class="message-image" src="${escapeHtml(item.src)}" alt="${escapeHtml(item.name)}" loading="lazy">
                  </div>
                `).join("")}
              </div>
            ` : ""}
          </article>
        `;
      }).join("");

      state.renderedThreadId = state.watch?.threadId || state.currentThreadId || "";

      requestAnimationFrame(() => {
        if (preserveScroll) {
          const nextHeight = document.documentElement.scrollHeight;
          window.scrollTo({
            top: Math.max(0, window.scrollY + (nextHeight - previousHeight)),
            behavior: "auto",
          });
          return;
        }

        if (snapToBottom) scrollToLatest();
      });
    };

    loadHistory = async function() {
      const threadId = state.watch?.threadId || state.currentThreadId;
      if (!threadId) {
        state.visibleMessageCount = state.historyPageSize;
        renderHistory([]);
        return null;
      }

      const threadChanged = state.renderedThreadId !== threadId;
      const stickToBottom = threadChanged || isNearBottom();
      const data = await api(`/codex/history?thread=${encodeURIComponent(threadId)}`);

      if (threadChanged) {
        state.visibleMessageCount = state.historyPageSize;
      } else {
        state.visibleMessageCount = Math.max(state.visibleMessageCount, state.historyPageSize);
      }

      renderHistory(data.messages || [], {
        snapToBottom: stickToBottom,
      });
      return data;
    };

    async function loadStatus() {
      const params = new URLSearchParams();
      if (state.watch?.threadId) params.set("thread", state.watch.threadId);
      else if (state.currentThreadId) params.set("thread", state.currentThreadId);
      if (state.watch?.sessionFile) params.set("session", state.watch.sessionFile);
      if (state.watch?.since) params.set("since", state.watch.since);
      const data = await api(`/codex/status?${params.toString()}`);
      renderStatus(data);

      if (data.available === true) {
        setConnectionState("online", `Codex 状态接口正常 · ${data.status || "idle"}`);
      } else {
        setConnectionState("checking", "后端在线，但桌面 Codex 状态未确认");
      }

      if (data.status === "running") {
        setMeta("Codex 正在处理，你可以继续在手机上查看回流和最近进度。");
      } else if (data.status === "complete" && data.final) {
        setMeta("Codex 已完成，这一轮结果已经同步回来了。");
      } else if (data.status === "error") {
        setMeta("Codex 这一轮执行失败了，可以查看下面的最近状态。");
      }

      return data;
    }

    async function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function collectAttachments(files) {
      state.isReadingAttachments = true;
      updateSendState();
      const task = (async () => {
        const rows = [];
        for (const file of files) {
          rows.push({
            name: file.name,
            type: file.type,
            dataUrl: await readFileAsDataUrl(file),
          });
        }
        return rows;
      })();
      state.attachmentReadPromise = task;
      try {
        return await task;
      } finally {
        if (state.attachmentReadPromise === task) {
          state.attachmentReadPromise = null;
        }
        state.isReadingAttachments = false;
        updateSendState();
      }
    }

    async function selectThread(threadId) {
      if (!threadId) return;
      state.currentThreadId = threadId;
      renderThreadSummary();
      renderThreadDrawer();
      setDrawer(false);
      setMeta("正在切换到目标线程...");
      try {
        await api("/codex/select", {
          method: "POST",
          body: JSON.stringify({ threadId }),
        });
        setMeta("线程已切换，现在可以直接继续提问。");
        await loadHistory();
        await loadStatus();
      } catch (error) {
        setMeta(`切换失败: ${error.message}`);
      }
    }

    async function refreshEverything(message = "正在同步最新状态...") {
      setMeta(message);
      try {
        await loadThreads();
        await loadHistory();
        await loadStatus();
        setMeta("已经同步到最新状态。");
      } catch (error) {
        setMeta(`同步失败: ${error.message}`);
      }
    }

    async function createNewThread() {
      clearPollTimer();
      setMeta("正在让桌面 Codex 新建对话...");
      try {
        await api("/codex/new-thread", {
          method: "POST",
          body: JSON.stringify({ projectPath: "" }),
        });
        state.watch = null;
        setMeta("新线程已经打开，接下来发消息就会落到新的对话里。");
        setDrawer(false);
        setTimeout(() => {
          loadThreads().catch(() => {});
        }, 1000);
      } catch (error) {
        setMeta(`新建失败: ${error.message}`);
      }
    }

    tokenBox.textContent = maskToken(token);
    composerStatusMeta.textContent = token ? "本地直连" : "缺少 token";
    setConnectionState(token ? "checking" : "offline", token ? "后端在线前先检查 Codex 状态" : "缺少 token");

    fileInput.addEventListener("change", async () => {
      const files = Array.from(fileInput.files || []);
      if (!files.length) return;

      setMeta("正在读取图片...");
      try {
        const rows = await collectAttachments(files);
        state.attachments.push(...rows);
        renderAttachmentPreview();
      } catch (error) {
        setMeta(`图片读取失败: ${error.message}`);
      } finally {
        fileInput.value = "";
      }
    });

    messageInput.addEventListener("input", () => {
      document.body.classList.toggle("chat-active", Boolean(messageInput.value.trim() || state.attachments.length || state.lastMessages.length));
      autoResizeComposer();
      updateSendState();
    });

    modelPickerBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      setModelPanel(!state.modelPanelOpen);
      renderModelPicker();
    });

    brandChip.addEventListener("click", (event) => {
      event.stopPropagation();
      setBrandStatusOpen(!state.brandStatusOpen);
    });

    document.getElementById("closeModelPanelBtn").addEventListener("click", () => {
      setModelPanel(false);
    });

    applyModelBtn.addEventListener("click", async () => {
      await applyModelConfig();
    });

    document.getElementById("menuBtn").addEventListener("click", async () => {
      try {
        await loadThreads();
      } catch {}
      setDrawer(true);
    });

    document.getElementById("closeDrawerBtn").addEventListener("click", () => {
      setDrawer(false);
    });

    drawerBackdrop.addEventListener("click", () => {
      setDrawer(false);
    });

    document.addEventListener("click", (event) => {
      if (!brandChip.contains(event.target)) {
        setBrandStatusOpen(false);
      }
      if (!state.modelPanelOpen) return;
      if (modelPanel.contains(event.target) || modelPickerBtn.contains(event.target)) return;
      setModelPanel(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && state.brandStatusOpen) {
        setBrandStatusOpen(false);
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && state.drawerOpen) setDrawer(false);
      if (event.key === "Escape" && state.modelPanelOpen) setModelPanel(false);
    });

    window.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) return;
      beginPullGesture(event.touches[0].clientY);
    }, { passive: true });

    window.addEventListener("touchmove", (event) => {
      if (!state.pullActive) return;

      const touch = event.touches[0];
      if (!touch) return;
      if (window.scrollY > 6 || state.drawerOpen) {
        resetPullGesture();
        renderHistoryLoader();
        return;
      }

      if (touch.clientY > state.pullStartY) {
        event.preventDefault();
      }
      updatePullGesture(touch.clientY);
    }, { passive: false });

    window.addEventListener("touchend", () => {
      if (!state.pullActive || state.pullTriggered || state.loadingOlderMessages) return;
      resetPullGesture();
      renderHistoryLoader();
    }, { passive: true });

    window.addEventListener("touchcancel", () => {
      if (!state.pullActive || state.pullTriggered || state.loadingOlderMessages) return;
      resetPullGesture();
      renderHistoryLoader();
    }, { passive: true });

    window.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "touch" || event.isPrimary === false) return;
      beginPullGesture(event.clientY, event.pointerId);
    });

    window.addEventListener("pointermove", (event) => {
      if (event.pointerType === "touch") return;
      if (!state.pullActive || state.pullPointerId !== event.pointerId) return;

      if (window.scrollY > 6 || state.drawerOpen) {
        resetPullGesture();
        renderHistoryLoader();
        return;
      }

      if (event.clientY > state.pullStartY) {
        event.preventDefault();
      }
      updatePullGesture(event.clientY);
    });

    window.addEventListener("pointerup", (event) => {
      if (!state.pullActive || state.pullPointerId !== event.pointerId || state.pullTriggered || state.loadingOlderMessages) return;
      resetPullGesture();
      renderHistoryLoader();
    });

    window.addEventListener("pointercancel", (event) => {
      if (!state.pullActive || state.pullPointerId !== event.pointerId || state.pullTriggered || state.loadingOlderMessages) return;
      resetPullGesture();
      renderHistoryLoader();
    });

    window.addEventListener("mousedown", (event) => {
      if (event.button !== 0) return;
      beginPullGesture(event.clientY, "mouse");
    });

    window.addEventListener("mousemove", (event) => {
      if (!state.pullActive || state.pullPointerId !== "mouse") return;

      if (window.scrollY > 6 || state.drawerOpen) {
        resetPullGesture();
        renderHistoryLoader();
        return;
      }

      if (event.clientY > state.pullStartY) {
        event.preventDefault();
      }
      updatePullGesture(event.clientY);
    });

    window.addEventListener("mouseup", () => {
      if (!state.pullActive || state.pullPointerId !== "mouse" || state.pullTriggered || state.loadingOlderMessages) return;
      resetPullGesture();
      renderHistoryLoader();
    });

    document.getElementById("drawerNewThreadBtn").addEventListener("click", createNewThread);

    historyList.addEventListener("click", (event) => {
      const richCopy = event.target.closest("[data-copy-message]");
      if (richCopy) {
        copyMessageBody(richCopy);
        return;
      }
      const messageToggle = event.target.closest("[data-toggle-message]");
      if (messageToggle) {
        toggleMessageBlock(messageToggle);
        return;
      }
      const toggle = event.target.closest("[data-toggle-code]");
      if (toggle) {
        toggleCodeBlock(toggle);
        return;
      }
      const button = event.target.closest("[data-copy-code]");
      if (!button) return;
      copyCodeBlock(button);
    });

    document.getElementById("sendBtn").addEventListener("click", async () => {
      if (state.isRunning) {
        await interruptConversation();
        return;
      }

      if (state.attachmentReadPromise) {
        setMeta("姝ｅ湪绛夊浘鐗囪鍙栧畬鎴?..");
        try {
          await state.attachmentReadPromise;
        } catch {
          return;
        }
      }

      if (!messageInput.value.trim() && !state.attachments.length) return;

      clearPollTimer();
      state.isSending = true;
      state.interruptRequested = false;
      setComposerRunning(true);
      setMeta("正在把消息送进桌面 Codex...");
      const payload = {
        text: messageInput.value,
        threadId: state.currentThreadId,
        attachments: [...state.attachments],
      };

      try {
        const data = await api("/send", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        state.watch = data.watch;
        if (!payload.threadId && data.watch?.threadId) {
          state.currentThreadId = data.watch.threadId;
        }
        setMeta(`已发送 ${formatTime(data.sentAt || "")}`);
        messageInput.value = "";
        state.attachments = [];
        autoResizeComposer();
        renderAttachmentPreview();
        updateSendState();
        await loadThreads();
        await loadHistory();
        const status = await loadStatus();
        if (state.interruptRequested && status && status.status === "running") {
          await interruptConversation();
        } else if (status && (status.status === "running" || state.isSending || state.interruptRequested)) {
          schedulePoll();
        }
      } catch (error) {
        setComposerRunning(false);
        setMeta(`发送失败: ${error.message}`);
      }
    });

    async function boot() {
      autoResizeComposer();
      updateSendState();
      renderAttachmentPreview();
      renderModelPicker();

      if (!state.token) {
        setMeta("缺少 token，当前页面无法调用本地服务。");
        tokenBox.textContent = "缺少 token";
        composerStatusMeta.textContent = "未鉴权";
        setConnectionState("offline", "缺少 token");
        return;
      }

      try {
        await loadModelConfig().catch(() => {});
        await loadThreads();
        await loadHistory();
        await loadStatus();
      } catch (error) {
        setConnectionState("offline", error.message || "连接失败");
        setMeta(`初始化失败: ${error.message}`);
      }
    }

    boot();
  </script>
</body>
</html>
