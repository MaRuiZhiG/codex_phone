<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Codex Phone</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --ink: #111318;
      --muted: #6f7682;
      --muted-2: #969daa;
      --line: rgba(17, 19, 24, 0.065);
      --line-strong: rgba(17, 19, 24, 0.12);
      --surface: rgba(255, 255, 255, 0.98);
      --surface-soft: rgba(247, 248, 251, 0.94);
      --chip: #f1f3f7;
      --chip-strong: #eceef3;
      --blue: #84c3ff;
      --blue-strong: #2888f5;
      --blue-soft: rgba(132, 195, 255, 0.18);
      --aura: rgba(75, 162, 255, 0.14);
      --shadow: 0 20px 42px rgba(54, 72, 102, 0.1);
      --shadow-soft: 0 10px 22px rgba(54, 72, 102, 0.07);
      --shadow-deep: 0 24px 56px rgba(41, 68, 110, 0.12);
      --radius-xl: 34px;
      --radius-lg: 28px;
      --radius-md: 22px;
      --radius-sm: 18px;
      font-family: "Segoe UI Variable Display", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 10%, rgba(143, 214, 255, 0.16), transparent 26%),
        radial-gradient(circle at 88% 20%, rgba(126, 194, 255, 0.11), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 68%, #f2f7ff 100%);
      overflow-x: hidden;
      position: relative;
    }

    body.chat-active {
      background:
        radial-gradient(circle at 50% 86%, rgba(127, 194, 255, 0.64), rgba(127, 194, 255, 0.22) 24%, rgba(255, 255, 255, 0) 52%),
        radial-gradient(circle at 18% 10%, rgba(139, 220, 255, 0.16), rgba(255,255,255,0) 28%),
        linear-gradient(180deg, #ffffff 0%, #fbfdff 58%, #eef6ff 100%);
    }

    body.drawer-open {
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      pointer-events: none;
      z-index: 0;
      filter: blur(8px);
    }

    body::before {
      width: 220px;
      height: 220px;
      top: 82px;
      right: -68px;
      background: radial-gradient(circle, rgba(135, 214, 255, 0.28) 0%, rgba(135, 214, 255, 0.08) 42%, rgba(135, 214, 255, 0) 72%);
      animation: float-orb 9s ease-in-out infinite;
    }

    body::after {
      width: 172px;
      height: 172px;
      bottom: 132px;
      left: -56px;
      background: radial-gradient(circle, rgba(159, 205, 255, 0.18) 0%, rgba(159, 205, 255, 0.05) 44%, rgba(159, 205, 255, 0) 74%);
      animation: float-orb 12s ease-in-out infinite reverse;
    }

    button,
    textarea,
    input {
      font: inherit;
    }

    button {
      appearance: none;
      border: 0;
      background: none;
      color: inherit;
      padding: 0;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .app-shell {
      width: min(100%, 480px);
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      padding: 0 18px 170px;
      z-index: 1;
    }

    .app-shell::before {
      content: "";
      position: absolute;
      inset: 72px 10px 120px;
      border-radius: 42px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.52), rgba(255,255,255,0.18) 36%, rgba(255,255,255,0));
      pointer-events: none;
      z-index: 0;
      opacity: 0.9;
    }

    .appbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 6;
      margin: 0 -18px;
      padding: 16px 18px 12px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.9) 68%, rgba(255,255,255,0.2) 92%, rgba(255,255,255,0));
      backdrop-filter: blur(20px) saturate(1.22);
      -webkit-backdrop-filter: blur(20px) saturate(1.22);
    }

    .appbar-left,
    .appbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 44px;
    }

    .appbar-right {
      position: relative;
      justify-content: flex-end;
      min-width: auto;
    }

    .appbar-title {
      flex: 1;
      display: flex;
      justify-content: center;
      min-width: 0;
    }

    .icon-button {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 8px 18px rgba(77, 112, 168, 0.07);
      transition: background .18s ease, transform .18s ease, box-shadow .18s ease;
    }

    .icon-button:active,
    .composer-plus:active,
    .send-button:active,
    .drawer-row:active,
    .drawer-thread:active,
    .status-action:active {
      transform: scale(.965);
    }

    .icon-button:hover,
    .composer-plus:hover,
    .status-action:hover {
      background: rgba(255, 255, 255, 0.84);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.94), 0 14px 26px rgba(77, 112, 168, 0.12);
    }

    .model-chip {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.58);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.94), 0 8px 18px rgba(69, 104, 158, 0.07);
      cursor: pointer;
    }

    .model-chip-title {
      font-size: 19px;
      font-weight: 500;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .model-chip-dot {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #cfd7e6;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.16);
      flex: 0 0 auto;
      transition: background .18s ease, box-shadow .18s ease, transform .18s ease;
    }

    .model-chip-dot.online {
      background: #22b573;
      box-shadow: 0 0 0 3px rgba(34, 181, 115, 0.16);
    }

    .model-chip-dot.offline {
      background: #e25252;
      box-shadow: 0 0 0 3px rgba(226, 82, 82, 0.16);
    }

    .model-chip-dot.checking {
      background: #f1b63b;
      box-shadow: 0 0 0 3px rgba(241, 182, 59, 0.16);
    }

    .brand-status-pop {
      position: absolute;
      top: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      min-width: 190px;
      max-width: min(72vw, 260px);
      padding: 11px 13px 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(17, 19, 24, 0.07);
      box-shadow: 0 18px 34px rgba(49, 74, 118, 0.14);
      backdrop-filter: blur(18px) saturate(1.12);
      -webkit-backdrop-filter: blur(18px) saturate(1.12);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 9;
    }

    .brand-status-pop.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .brand-status-pop::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -7px;
      width: 14px;
      height: 14px;
      transform: translateX(-50%) rotate(45deg);
      background: rgba(255,255,255,0.96);
      border-left: 1px solid rgba(17, 19, 24, 0.07);
      border-top: 1px solid rgba(17, 19, 24, 0.07);
    }

    .brand-status-head {
      display: flex;
      align-items: center;
      gap: 9px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .brand-status-bullet {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #cfd7e6;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.16);
      flex: 0 0 auto;
    }

    .brand-status-bullet.online {
      background: #22b573;
      box-shadow: 0 0 0 3px rgba(34, 181, 115, 0.16);
    }

    .brand-status-bullet.offline {
      background: #e25252;
      box-shadow: 0 0 0 3px rgba(226, 82, 82, 0.16);
    }

    .brand-status-bullet.checking {
      background: #f1b63b;
      box-shadow: 0 0 0 3px rgba(241, 182, 59, 0.16);
    }

    .brand-status-copy {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .main-scroll {
      position: relative;
      z-index: 1;
      padding-top: 6px;
    }

    .hero-panel {
      min-height: calc(100dvh - 290px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 10px 36px;
      animation: fade-up .35s ease;
      position: relative;
      isolation: isolate;
    }

    .hero-panel::before {
      content: "";
      position: absolute;
      inset: 12% 6% auto;
      height: 220px;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(142, 214, 255, 0.24), rgba(142, 214, 255, 0.08) 40%, rgba(142, 214, 255, 0) 72%);
      filter: blur(8px);
      z-index: -1;
      animation: breathe 5.4s ease-in-out infinite;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(40px, 8vw, 60px);
      line-height: 1.08;
      letter-spacing: -0.07em;
      font-weight: 540;
      max-width: 7.4em;
      color: #121724;
      text-shadow: 0 8px 24px rgba(104, 144, 195, 0.08);
    }

    .hero-sub {
      margin: 20px 0 0;
      max-width: 30ch;
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
      background: rgba(255,255,255,0.62);
      padding: 13px 15px;
      border-radius: 24px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88), 0 14px 34px rgba(76, 110, 158, 0.07);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .status-action {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(17, 19, 24, 0.05);
      color: var(--muted);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.86), 0 14px 28px rgba(77, 112, 168, 0.08);
      font-size: 12px;
      white-space: nowrap;
    }

    .messages-shell {
      padding: 18px 0 12px;
      animation: fade-up .28s ease;
    }

    .thinking-shell {
      padding: 2px 0 16px;
      animation: fade-up .22s ease;
    }

    .thinking-card {
      margin-right: auto;
      max-width: min(88%, 100%);
      padding: 13px 15px 14px;
      border-radius: 24px;
      border: 1px solid rgba(58, 146, 255, 0.14);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(245,250,255,0.9));
      box-shadow: 0 18px 36px rgba(83, 137, 202, 0.12);
      backdrop-filter: blur(18px) saturate(1.18);
      -webkit-backdrop-filter: blur(18px) saturate(1.18);
    }

    .thinking-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .thinking-title {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
      color: var(--ink);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .thinking-pulse {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #54a8ff;
      box-shadow: 0 0 0 0 rgba(84, 168, 255, 0.36);
      animation: thinking-pulse 1.8s ease-out infinite;
      flex: 0 0 auto;
    }

    .thinking-time {
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .thinking-steps {
      display: grid;
      gap: 8px;
    }

    .thinking-step {
      display: grid;
      grid-template-columns: 8px minmax(0, 1fr);
      align-items: start;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .thinking-step-dot {
      width: 8px;
      height: 8px;
      margin-top: 6px;
      border-radius: 999px;
      background: rgba(58, 146, 255, 0.34);
    }

    .thinking-step-text {
      min-width: 0;
      word-break: break-word;
    }

    .history-loader-anchor {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
      min-height: 34px;
    }

    .history-loader-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(17, 19, 24, 0.06);
      color: var(--muted);
      box-shadow: var(--shadow-soft);
      font-size: 12px;
      letter-spacing: -0.01em;
      transform: translateY(var(--pull-shift, 0px)) scale(var(--pull-scale, 1));
      transition:
        transform 0.14s ease,
        box-shadow 0.18s ease,
        background 0.18s ease,
        border-color 0.18s ease,
        color 0.18s ease;
    }

    .history-loader-pill.loading {
      color: var(--ink);
    }

    .history-loader-pill.pulling,
    .history-loader-pill.holding {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.92);
      border-color: rgba(58, 146, 255, 0.16);
      box-shadow: 0 16px 34px rgba(58, 146, 255, 0.12);
    }

    .history-loader-pill.holding {
      box-shadow: 0 20px 40px rgba(58, 146, 255, 0.16);
    }

    .history-loader-gauge {
      position: relative;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: conic-gradient(
        #3a92ff calc(var(--pull-progress, 0) * 1turn),
        rgba(17, 19, 24, 0.10) 0
      );
    }

    .history-loader-gauge::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: inset 0 0 0 1px rgba(17, 19, 24, 0.05);
    }

    .history-loader-copy {
      display: flex;
      flex-direction: column;
      gap: 1px;
      line-height: 1.15;
      text-align: left;
    }

    .history-loader-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .history-loader-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .history-loader-spinner {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(17, 19, 24, 0.16);
      border-top-color: #3a92ff;
      animation: spin 0.9s linear infinite;
      flex: 0 0 auto;
    }

    .message-list {
      display: grid;
      gap: 12px;
    }

    .message-card {
      max-width: min(88%, 100%);
      padding: 14px 16px;
      border-radius: 26px;
      line-height: 1.62;
      box-shadow: 0 16px 32px rgba(70, 98, 145, 0.09);
      border: 1px solid rgba(17, 19, 24, 0.04);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(249,251,255,0.86));
      backdrop-filter: blur(14px) saturate(1.1);
      -webkit-backdrop-filter: blur(14px) saturate(1.1);
      position: relative;
      overflow: hidden;
    }

    .message-card.user {
      margin-left: auto;
      background:
        linear-gradient(180deg, rgba(235, 246, 255, 0.98), rgba(225, 240, 255, 0.92));
      box-shadow: 0 18px 36px rgba(80, 137, 210, 0.13);
    }

    .message-card.assistant,
    .message-card.system {
      margin-right: auto;
    }

    .message-card.assistant {
      border-color: rgba(48, 144, 255, 0.08);
      box-shadow: 0 18px 38px rgba(80, 137, 210, 0.1);
    }

    .message-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 54%;
      background: linear-gradient(180deg, rgba(255,255,255,0.44), rgba(255,255,255,0));
      pointer-events: none;
    }

    .message-card.assistant::after,
    .message-card.system::after {
      content: "";
      position: absolute;
      inset: 10px auto 10px 0;
      width: 3px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(67, 157, 255, 0.62), rgba(67, 157, 255, 0.08));
      opacity: 0.9;
      pointer-events: none;
    }

    .message-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 11px;
    }

    .message-role {
      color: var(--ink);
      font-weight: 650;
    }

    .message-text {
      font-size: 14.5px;
      color: #19202b;
      word-break: break-word;
    }

    .message-text .md-block {
      animation: message-block-in .42s ease both;
      animation-delay: calc(var(--block-index, 0) * 42ms);
    }

    .message-card.assistant .message-text .md-block + .md-block,
    .message-card.system .message-text .md-block + .md-block {
      margin-top: 10px;
    }

    .message-card.assistant .message-text .md-block-shell,
    .message-card.system .message-text .md-block-shell {
      padding: 12px 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.72), rgba(245,249,255,0.58));
      border: 1px solid rgba(67, 157, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.82), 0 10px 20px rgba(79, 122, 193, 0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .message-card.assistant .message-text .md-block-shell:active,
    .message-card.system .message-text .md-block-shell:active {
      transform: scale(.995);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.82), 0 8px 16px rgba(79, 122, 193, 0.06);
    }

    .message-text > *:first-child {
      margin-top: 0;
    }

    .message-text > *:last-child {
      margin-bottom: 0;
    }

    .message-text p {
      margin: 0 0 12px;
      line-height: 1.78;
    }

    .message-text .message-block {
      position: relative;
    }

    .message-text .message-block.collapsed {
      max-height: 580px;
      overflow: hidden;
    }

    .message-text .message-block.collapsed .message-block-fade {
      display: block;
    }

    .message-text .message-block-fade {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 96px;
      background: linear-gradient(180deg, rgba(248, 251, 255, 0), rgba(248, 251, 255, 0.96) 66%, rgba(248, 251, 255, 1));
      pointer-events: none;
    }

    .message-text .message-expand-row {
      display: flex;
      justify-content: flex-start;
      margin-top: 12px;
    }

    .message-text .message-expand-btn {
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(29, 120, 242, 0.12);
      background: rgba(239, 246, 255, 0.84);
      color: #176edc;
      font-size: 12px;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.88), 0 8px 16px rgba(68, 110, 182, 0.08);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
    }

    .message-rich-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 1px 0 11px;
      padding: 0 2px;
    }

    .message-rich-meta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .message-rich-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: rgba(39, 132, 255, 0.1);
      border: 1px solid rgba(39, 132, 255, 0.12);
      color: #1b72de;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .message-rich-hint {
      color: #6c7789;
      font-size: 10.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .message-rich-copy {
      min-height: 27px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(17, 19, 24, 0.06);
      background: rgba(255,255,255,0.76);
      color: #475367;
      font-size: 10.5px;
      font-weight: 600;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 8px 16px rgba(68, 110, 182, 0.08);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease, color .16s ease;
    }

    .message-rich-copy.copied {
      color: #176edc;
      border-color: rgba(29, 120, 242, 0.16);
      background: rgba(239, 246, 255, 0.92);
    }

    .message-text h1,
    .message-text h2,
    .message-text h3,
    .message-text h4 {
      margin: 0;
      line-height: 1.28;
      letter-spacing: -0.04em;
      color: #101723;
    }

    }

    .drawer-section {
      display: none;
    }

    .drawer-threads {
      margin-top: 12px;
      display: grid;
      gap: 10px;

    .drawer-project-threads {

    .drawer-project-toggle {
      width: 34px;

    .drawer-project-toggle svg {
      transition: transform .18s ease;
    }

    .drawer-project-toggle.collapsed svg {
      transform: rotate(-90deg);
    }

    .drawer-thread {
      width: 100%;
      padding: 14px 14px;
      border-radius: 18px;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      transition: background .18s ease, border-color .18s ease;
    }

    .drawer-project .drawer-thread {
      padding: 12px 12px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.76);

    .drawer-thread.active {
      background: linear-gradient(180deg, rgba(235,244,255,0.95), rgba(229,239,253,0.88));
      border-color: rgba(17, 19, 24, 0.06);

    }

    .drawer-thread-name {
      font-size: 15px;
      color: var(--ink);
      font-weight: 600;

    }

    .drawer-thread-meta {
      margin-top: 6px;

    .drawer-empty {
      padding: 20px 14px;
      color: var(--muted);
      line-height: 1.65;

    .drawer-footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid rgba(17, 19, 24, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .drawer-profile {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .drawer-avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      background: linear-gradient(135deg, #dcecff 0%, #9cc9ff 100%);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .drawer-avatar-inner {
      width: 36px;
      height: 36px;
      border-radius: inherit;
      background: #ffffff;

      display: grid;
      place-items: center;

      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .drawer-profile-name {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.03em;

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);

        opacity: 1;
        transform: translateY(0);

    }

    @keyframes spin {
      from {
        transform: rotate(0deg);

    @media (min-width: 960px) {

        margin: 0 auto;
      }

      .composer-wrap {
        width: min(100%, 760px);
      }
    }
  </style>
</head>
<body>
  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer-panel" id="drawerPanel" aria-hidden="true">
      <div class="drawer-topbar">

  </footer>

  <script>
    const token = new URLSearchParams(location.search).get("token") || "";
    const PULL_LOAD_DISTANCE = 96;
    const PULL_LOAD_HOLD_MS = 900;
    const state = {
      token,
      threads: [],
      currentThreadId: "",
      attachments: [],
      isReadingAttachments: false,
      attachmentReadPromise: null,
      projectCollapsed: (() => {
        try {
          return JSON.parse(localStorage.getItem("codex-phone-project-collapsed") || "{}");
        } catch {
          return {};
        }
      })(),
      isRunning: false,
      isSending: false,
      isInterrupting: false,
      interruptRequested: false,
      watch: null,
      pollTimer: null,
      drawerOpen: false,
      lastMessages: [],
      historyPageSize: 15,
      visibleMessageCount: 15,
      loadingOlderMessages: false,
      renderedThreadId: "",
      pullActive: false,
      pullTriggered: false,
      pullStartY: 0,
      pullDistance: 0,
      pullProgress: 0,
      pullHoldProgress: 0,
      pullHoldStartAt: 0,
      pullHoldTimer: null,
      pullPointerId: null,
      modelPanelOpen: false,
      modelConfig: null,
      draftModel: "",
      draftEffort: "",
      applyingModel: false,
      connectionState: token ? "checking" : "offline",
      brandStatusOpen: false,
      liveStatus: null,
      thinkingTimer: null,
      codeBlockMap: {},
      codeBlockCounter: 0,
      messageBodyMap: {},
      messageBodyCounter: 0,
    };

    const tokenBox = document.getElementById("tokenBox");
    const brandChip = document.getElementById("brandChip");
    const brandStatusDot = document.getElementById("brandStatusDot");
    const brandStatusPop = document.getElementById("brandStatusPop");
    const brandStatusBullet = document.getElementById("brandStatusBullet");
    const brandStatusLabel = document.getElementById("brandStatusLabel");
    const brandStatusCopy = document.getElementById("brandStatusCopy");
    const heroTitle = document.getElementById("heroTitle");
    const historyList = document.getElementById("historyList");
    const historyLoaderAnchor = document.getElementById("historyLoaderAnchor");
    const messagesShell = document.getElementById("messagesShell");
    const thinkingShell = document.getElementById("thinkingShell");
    const heroPanel = document.getElementById("heroPanel");
    const threadDrawerList = document.getElementById("threadDrawerList");
    const attachmentStrip = document.getElementById("attachmentStrip");
    const drawerBackdrop = document.getElementById("drawerBackdrop");
    const drawerPanel = document.getElementById("drawerPanel");
    const messageInput = document.getElementById("messageInput");
    const fileInput = document.getElementById("fileInput");
    const sendBtn = document.getElementById("sendBtn");
    const modelPickerBtn = document.getElementById("modelPickerBtn");
    const modelPickerName = document.getElementById("modelPickerName");
    const modelPickerEffort = document.getElementById("modelPickerEffort");
    const modelPanel = document.getElementById("modelPanel");
    const modelPanelSub = document.getElementById("modelPanelSub");
    const modelChoiceList = document.getElementById("modelChoiceList");
    const effortChipRow = document.getElementById("effortChipRow");
    const modelPanelNote = document.getElementById("modelPanelNote");
    const applyModelBtn = document.getElementById("applyModelBtn");
    const composerThreadMeta = document.getElementById("composerThreadMeta");
    const composerStatusMeta = document.getElementById("composerStatusMeta");

    function maskToken(value) {
      if (!value) return "缺少 token";
      if (value.length <= 12) return `已连接 ${value}`;
      return `已连接 ${value.slice(0, 6)}...${value.slice(-4)}`;
    }

    function setConnectionState(nextState, message = "") {
      const normalized = nextState === "online" || nextState === "offline" ? nextState : "checking";
      state.connectionState = normalized;
      brandStatusDot.classList.toggle("online", normalized === "online");
      brandStatusDot.classList.toggle("offline", normalized === "offline");
      brandStatusDot.classList.toggle("checking", normalized === "checking");
      brandStatusBullet.classList.toggle("online", normalized === "online");
      brandStatusBullet.classList.toggle("offline", normalized === "offline");
      brandStatusBullet.classList.toggle("checking", normalized === "checking");

      const label = normalized === "online"
        ? "Codex 状态正常"
        : normalized === "offline"
          ? "后端或鉴权失败"
          : "桌面 Codex 状态未确认";
      const detail = message ? `，${message}` : "";
      brandChip.setAttribute("aria-label", `Codex Phone，${label}${detail}`);
      brandChip.title = `${label}${message ? `：${message}` : ""}`;
      brandStatusLabel.textContent = normalized === "online"
        ? "Codex 正常"
        : normalized === "offline"
          ? "后端或鉴权失败"
          : "后端在线，等待桌面状态";
      brandStatusCopy.textContent = message || (
        normalized === "online"
          ? "桌面 Codex 状态接口已正常返回。"
          : normalized === "offline"
            ? "当前无法正常调用本地后端或 token 校验未通过。"
            : "前端已经连到后端，但还没有确认桌面 Codex 的状态接口。"
      );
    }

    function markBackendReachable(message = "") {
      if (state.connectionState !== "online") {
        setConnectionState("checking", message || "后端在线，等待确认 Codex 状态");
      }
    }

    function setBrandStatusOpen(open) {
      state.brandStatusOpen = Boolean(open);
      brandStatusPop.classList.toggle("show", state.brandStatusOpen);
      brandChip.setAttribute("aria-expanded", state.brandStatusOpen ? "true" : "false");
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"]/g, (s) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
      }[s]));
    }

    function escapeAttribute(value) {
      return String(value || "").replace(/[&<>"]/g, (s) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
      }[s]));
    }

    function safeHref(value) {
      const text = String(value || "").trim();
      if (!text) return "";
      if (/^(https?:|mailto:)/i.test(text)) return text;
      return "";
    }

    function registerCodeBlock(source) {
      const id = `code-${++state.codeBlockCounter}`;
      const text = String(source || "");
      state.codeBlockMap[id] = {
        text,
        lineCount: text ? text.split("\n").length : 0,
      };
      return id;
    }

    function registerMessageBody(source) {
      const id = `body-${++state.messageBodyCounter}`;
      state.messageBodyMap[id] = String(source || "");
      return id;
    }

    function codeLanguageLabel(value) {
      const lang = String(value || "").trim().toLowerCase();
      if (!lang) return "Code";
      const labels = {
        js: "JavaScript",
        javascript: "JavaScript",
        ts: "TypeScript",
        typescript: "TypeScript",
        py: "Python",
        python: "Python",
        sh: "Shell",
        bash: "Bash",
        zsh: "Shell",
        ps1: "PowerShell",
        powershell: "PowerShell",
        json: "JSON",
        html: "HTML",
        css: "CSS",
        sql: "SQL",
        yaml: "YAML",
        yml: "YAML",
        md: "Markdown",
        markdown: "Markdown",
        xml: "XML",
      };
      return labels[lang] || lang.toUpperCase();
    }

    function shouldCollapseCodeBlock(text) {
      const source = String(text || "");
      const lineCount = source ? source.split("\n").length : 0;
      return lineCount > 12 || source.length > 720;
    }

    function shouldCollapseMessageText(text) {
      const source = String(text || "").trim();
      if (!source) return false;
      const lineCount = source.split("\n").length;
      return source.length > 1200 || lineCount > 26;
    }

    function isAssistantLikeMessage(message) {
      const role = String(message?.role || "").toLowerCase();
      return role === "assistant" || role === "system";
    }

    function renderInlineMarkdown(input) {
      const source = String(input || "");
      const tokens = [];
      let html = escapeHtml(source);

      html = html.replace(/`([^`\n]+)`/g, (_, code) => {
        const token = `__CODE_TOKEN_${tokens.length}__`;
        tokens.push(`<code>${code}</code>`);
        return token;
      });

      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g, (_, label, href) => {
        const safe = safeHref(href);
        if (!safe) return escapeHtml(label);
        return `<a href="${escapeAttribute(safe)}" target="_blank" rel="noreferrer">${label}</a>`;
      });

      html = html.replace(/(^|[\s(])(https?:\/\/[^\s<]+)/g, (_, prefix, href) => {
        const safe = safeHref(href);
        if (!safe) return `${prefix}${href}`;
        return `${prefix}<a href="${escapeAttribute(safe)}" target="_blank" rel="noreferrer">${href}</a>`;
      });

      html = html
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/__([^_]+)__/g, "<strong>$1</strong>")
        .replace(/(^|[\s(])\*([^*\n]+)\*(?=$|[\s).,!?:;])/g, "$1<em>$2</em>")
        .replace(/(^|[\s(])_([^_\n]+)_(?=$|[\s).,!?:;])/g, "$1<em>$2</em>")
        .replace(/~~([^~]+)~~/g, "<del>$1</del>");

      tokens.forEach((token, index) => {
        html = html.replace(`__CODE_TOKEN_${index}__`, token);
      });

      return html;
    }

    function parseMarkdownTable(lines, startIndex) {
      const headerLine = lines[startIndex] || "";
      const dividerLine = lines[startIndex + 1] || "";
      if (!headerLine.includes("|") || !dividerLine.includes("|")) return null;

      const dividerCells = dividerLine.split("|").map((cell) => cell.trim()).filter(Boolean);
      if (!dividerCells.length || dividerCells.some((cell) => !/^:?-{3,}:?$/.test(cell))) {
        return null;
      }

      const readCells = (line) => {
        let normalized = line.trim();
        if (normalized.startsWith("|")) normalized = normalized.slice(1);
        if (normalized.endsWith("|")) normalized = normalized.slice(0, -1);
        return normalized.split("|").map((cell) => cell.trim());
      };

      const headers = readCells(headerLine);
      const rows = [];
      let cursor = startIndex + 2;
      while (cursor < lines.length) {
        const line = lines[cursor] || "";
        if (!line.trim() || !line.includes("|")) break;
        rows.push(readCells(line));
        cursor += 1;
      }

      return {
        html: `
          <div class="table-block">
            <div class="table-block-top">
              <span class="table-block-label">表格</span>
              <span class="table-block-hint">左右滑动查看完整内容</span>
            </div>
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>${headers.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${rows.map((cells) => `<tr>${cells.map((cell) => `<td>${renderInlineMarkdown(cell)}</td>`).join("")}</tr>`).join("")}
                </tbody>
              </table>
            </div>
          </div>
        `,
        nextIndex: cursor,
      };
    }

    function renderMarkdown(input) {
      const lines = String(input || "").replace(/\r\n?/g, "\n").split("\n");
      const blocks = [];
      let index = 0;

      const pushParagraph = (rows) => {
        if (!rows.length) return;
        const text = rows.join("\n");
        blocks.push(`<div class="md-block md-block-paragraph" style="--block-index:${blocks.length}"><div class="md-block-shell"><p>${renderInlineMarkdown(text).replace(/\n/g, "<br>")}</p></div></div>`);
      };

      while (index < lines.length) {
        const raw = lines[index];
        const trimmed = raw.trim();

        if (!trimmed) {
          index += 1;
          continue;
        }

        const fence = raw.match(/^```([\w-]+)?\s*$/);
        if (fence) {
          const lang = String(fence[1] || "").trim();
          const rows = [];
          index += 1;
          while (index < lines.length && !/^```/.test(lines[index])) {
            rows.push(lines[index]);
            index += 1;
          }
          if (index < lines.length) index += 1;
          const codeText = rows.join("\n");
          const codeId = registerCodeBlock(codeText);
          const langLabel = escapeHtml(codeLanguageLabel(lang));
          const collapsed = shouldCollapseCodeBlock(codeText);
          blocks.push(`
            <div class="md-block md-block-code" style="--block-index:${blocks.length}">
              <div class="code-block${collapsed ? " collapsed" : ""}" data-code-block="${escapeAttribute(codeId)}">
                <div class="code-block-top">
                  <span class="code-block-lang">${langLabel}</span>
                  <span class="code-block-actions">
                    ${collapsed ? `<button class="code-toggle-btn active" data-toggle-code="${escapeAttribute(codeId)}" type="button">展开</button>` : ""}
                    <button class="code-copy-btn" data-copy-code="${escapeAttribute(codeId)}" type="button">复制</button>
                  </span>
                </div>
                <div class="code-block-fade" aria-hidden="true"></div>
                <pre><code>${escapeHtml(codeText)}</code></pre>
              </div>
            </div>
          `);
          continue;
        }

        const table = parseMarkdownTable(lines, index);
        if (table) {
          blocks.push(`<div class="md-block md-block-table" style="--block-index:${blocks.length}">${table.html}</div>`);
          index = table.nextIndex;
          continue;
        }

        const heading = raw.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          const level = Math.min(4, heading[1].length);
          blocks.push(`<div class="md-block md-block-heading" style="--block-index:${blocks.length}"><h${level}>${renderInlineMarkdown(heading[2].trim())}</h${level}></div>`);
          index += 1;
          continue;
        }

        if (/^(-{3,}|\*{3,}|_{3,})$/.test(trimmed)) {
          blocks.push(`<div class="md-block md-block-rule" style="--block-index:${blocks.length}"><hr></div>`);
          index += 1;
          continue;
        }

        if (/^>\s?/.test(raw)) {
          const rows = [];
          while (index < lines.length && /^>\s?/.test(lines[index])) {
            rows.push(lines[index].replace(/^>\s?/, ""));
            index += 1;
          }
          blocks.push(`<div class="md-block md-block-quote" style="--block-index:${blocks.length}"><div class="md-block-shell"><blockquote>${renderMarkdown(rows.join("\n"))}</blockquote></div></div>`);
          continue;
        }

        const unordered = raw.match(/^[-*+]\s+(.+)$/);
        if (unordered) {
          const items = [];
          while (index < lines.length) {
            const match = lines[index].match(/^[-*+]\s+(.+)$/);
            if (!match) break;
            items.push(`<li>${renderInlineMarkdown(match[1])}</li>`);
            index += 1;
          }
          blocks.push(`<div class="md-block md-block-list" style="--block-index:${blocks.length}"><div class="md-block-shell"><ul>${items.join("")}</ul></div></div>`);
          continue;
        }

        const ordered = raw.match(/^\d+\.\s+(.+)$/);
        if (ordered) {
          const items = [];
          while (index < lines.length) {
            const match = lines[index].match(/^\d+\.\s+(.+)$/);
            if (!match) break;
            items.push(`<li>${renderInlineMarkdown(match[1])}</li>`);
            index += 1;
          }
          blocks.push(`<div class="md-block md-block-list" style="--block-index:${blocks.length}"><div class="md-block-shell"><ol>${items.join("")}</ol></div></div>`);
          continue;
        }

        const paragraphRows = [];
        while (index < lines.length) {
          const line = lines[index];
          const text = line.trim();
          if (!text) break;
          if (/^```/.test(line)) break;
          if (/^(#{1,4})\s+/.test(line)) break;
          if (/^>\s?/.test(line)) break;
          if (/^[-*+]\s+/.test(line)) break;
          if (/^\d+\.\s+/.test(line)) break;
          if (/^(-{3,}|\*{3,}|_{3,})$/.test(text)) break;
          if (parseMarkdownTable(lines, index)) break;
          paragraphRows.push(text);
          index += 1;
        }
        pushParagraph(paragraphRows);
      }

      return blocks.join("");
    }

    function renderMessageText(message) {
      const text = String(message?.text || "");
      if (!text.trim()) return "";
      const collapsed = shouldCollapseMessageText(text);
      const blockId = `msg-${message?.id || message?.timestamp || Math.random().toString(36).slice(2)}`.replace(/[^a-zA-Z0-9_-]/g, "-");
      const bodyId = registerMessageBody(text);
      const richTopbar = isAssistantLikeMessage(message) ? `
        <div class="message-rich-topbar">
          <span class="message-rich-meta">
            <span class="message-rich-badge">AI 回答</span>
            <span class="message-rich-hint">已自动优化为更清晰的阅读排版</span>
          </span>
          <button class="message-rich-copy" data-copy-message="${escapeAttribute(bodyId)}" type="button">复制回答</button>
        </div>
      ` : "";
      return `
        <div class="message-text">
          ${richTopbar}
          <div class="message-block${collapsed ? " collapsed" : ""}" data-message-block="${escapeAttribute(blockId)}">
            ${renderMarkdown(text)}
            <div class="message-block-fade" aria-hidden="true"></div>
          </div>
          ${collapsed ? `<div class="message-expand-row"><button class="message-expand-btn" data-toggle-message="${escapeAttribute(blockId)}" type="button">展开更多</button></div>` : ""}
        </div>
      `;
    }

    async function copyCodeBlock(button) {
      const codeId = button?.getAttribute("data-copy-code") || "";
      const row = state.codeBlockMap[codeId];
      const text = row?.text || "";
      if (!text) {
        setMeta("没有找到这段代码内容。");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        const original = button.textContent || "复制";
        button.textContent = "已复制";
        button.classList.add("copied");
        setTimeout(() => {
          button.textContent = original;
          button.classList.remove("copied");
        }, 1400);
        setMeta("代码已复制到剪贴板。");
      } catch (error) {
        setMeta("复制失败，请长按代码块手动复制。");
      }
    }

    async function copyMessageBody(button) {
      const bodyId = button?.getAttribute("data-copy-message") || "";
      const text = state.messageBodyMap[bodyId] || "";
      if (!text) {
        setMeta("没有找到这条回答内容。");

      }

    function toggleCodeBlock(button) {
      const codeId = button?.getAttribute("data-toggle-code") || "";
      const block = codeId ? historyList.querySelector(`[data-code-block="${CSS.escape(codeId)}"]`) : null;
      if (!block) return;
      const collapsed = block.classList.toggle("collapsed");
      button.textContent = collapsed ? "展开" : "收起";
      button.classList.toggle("active", collapsed);
    }

    function toggleMessageBlock(button) {
      const blockId = button?.getAttribute("data-toggle-message") || "";
      const block = blockId ? historyList.querySelector(`[data-message-block="${CSS.escape(blockId)}"]`) : null;
      if (!block) return;
